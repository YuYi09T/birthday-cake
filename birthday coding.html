<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>生日蛋糕</title>
    <style>
        body {
            background-color: #232526;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        .hint {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .cake-container {
            position: relative;
            width: 300px;
            height: 300px;
            cursor: pointer;
            z-index: 10;
        }

        .plate {
            width: 270px;
            height: 15px;
            background: #4a4a4a;
            border-radius: 10px;
            position: absolute;
            bottom: 10px;
            left: 15px;
        }

        .layer-bottom {
            width: 220px;
            height: 80px;
            background: #ff7675;
            border-radius: 10px 10px 0 0;
            position: absolute;
            bottom: 25px;
            left: 40px;
        }

        .layer-top {
            width: 160px;
            height: 60px;
            background: #fd6ea5;
            border-radius: 10px 10px 0 0;
            position: absolute;
            bottom: 105px;
            left: 70px;
        }

        .icing {
            width: 100%;
            height: 20px;
            background: #fff;
            border-radius: 10px 10px 0 0;
            position: absolute;
            top: 0;
        }

        .candle {
            width: 12px;
            height: 45px;
            background: #74b9ff;
            position: absolute;
            bottom: 165px;
            left: 144px;
            border-radius: 3px;
        }

        .wick {
            width: 2px;
            height: 10px;
            background: #dae3e5;
            position: absolute;
            top: -10px;
            left: 5px;
        }

        .flame {
            width: 12px;
            height: 20px;
            background: #ff9f43;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: absolute;
            top: -30px;
            left: 0px;
            box-shadow: 0 0 10px #ff9f43, 0 0 20px #ff9f43;
            transform-origin: center bottom;
            animation: flicker 0.6s ease-in-out infinite alternate;
            transition: all 0.3s ease;
        }

        .flame.extinguished {
            opacity: 0;
            transform: scale(0);
        }

        .text {
            color: #fff;
            font-size: 28px;
            margin-top: 30px;
            font-weight: bold;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease;
        }

        .text.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* 飘落的彩色音符样式 */
        .note {
            position: absolute;
            color: #fff;
            font-size: 24px;
            top: -30px;
            z-index: 1;
            user-select: none;
            animation: fall linear forwards;
        }

        @keyframes flicker {
            0% { transform: scale(1) rotate(-2deg); background: #ff9f43; }
            100% { transform: scale(1.1) rotate(2deg); background: #ff5722; box-shadow: 0 0 12px #ff5722;}
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- 1. 核心：嵌入音频标签 -->
    <!-- 这里使用了一首公共的网络生日歌链接，你也可以换成自己下载好的本地 mp3 文件路径 -->
    <audio id="bgm" src="bgm.mp3" loop></audio>

    <div class="hint" id="hint">点击蛋糕，吹灭蜡烛听生日歌吧！</div>

    <div class="cake-container" id="cake">
        <div class="candle">
            <div class="wick"></div>
            <div class="flame" id="flame"></div>
        </div>
        <div class="layer-top"><div class="icing"></div></div>
        <div class="layer-bottom"><div class="icing"></div></div>
        <div class="plate"></div>
    </div>

    <div class="text" id="wishText">🎵 祝姐姐生日快乐！ 🎵</div>

    <script>
        const cake = document.getElementById('cake');
        const flame = document.getElementById('flame');
        const wishText = document.getElementById('wishText');
        const hint = document.getElementById('hint');
        const bgm = document.getElementById('bgm'); // 获取音频对象
        
        let isLit = true;

        cake.addEventListener('click', () => {
            if (!isLit) return; 

            isLit = false;
            flame.classList.add('extinguished'); 
            wishText.classList.add('show');      
            hint.style.display = 'none';         

            // 2. 核心：调用 JS 播放音乐
            bgm.play().catch(error => {
                console.log("音频播放失败，可能是由于浏览器限制：", error);
            });

            // 触发全屏音符飘落特效
            createNotesEffect();
        });

        // 动态生成彩色音符
        function createNotesEffect() {
            const notes = ['🎵', '🎶', '✨', '🎈', '🎉', '❤️'];
            const colors = ['#f53b57', '#3c40c6', '#05c46b', '#ffc048', '#ff5e57', '#ef5777'];
            
            for (let i = 0; i < 60; i++) {
                const noteElement = document.createElement('div');
                noteElement.classList.add('note');
                
                // 随机选择音符图标和颜色
                noteElement.innerText = notes[Math.floor(Math.random() * notes.length)];
                noteElement.style.color = colors[Math.floor(Math.random() * colors.length)];
                
                // 随机位置和大小
                noteElement.style.left = Math.random() * 100 + 'vw';
                noteElement.style.fontSize = Math.random() * 20 + 16 + 'px';
                
                // 随机下落速度
                const duration = Math.random() * 3 + 3; 
                noteElement.style.animationDuration = duration + 's';
                noteElement.style.animationDelay = Math.random() * 1.5 + 's';

                document.body.appendChild(noteElement);

                // 播放完后移除节点
                setTimeout(() => {
                    noteElement.remove();
                }, (duration + 1.5) * 1000);
            }
        }
    </script>
</body>
</html>
